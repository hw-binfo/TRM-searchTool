<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { margin:0; background:#f8f8f8; display:flex; align-items:center; justify-content:center; height:100vh; font-family:sans-serif; }
    .msg { color:#aaa; font-size:0.9rem; text-align:center; }
  </style>
</head>
<body>
  <div class="msg" id="msg">Loading chart…</div>

  <!-- Encrypted chart: Ingrdient_scatter_v5.enc.js generated by tools/encrypt.html -->
  <script src="Ingrdient_scatter_v5.enc.js"></script>
  <script>
  (async function () {
    var msg = document.getElementById("msg");
    if (sessionStorage.getItem("trm_auth") !== "1") {
      msg.textContent = "Session expired. Please reload the page and sign in again.";
      return;
    }
    if (typeof ENCRYPTED_BLOB === "undefined") {
      msg.textContent = "Encrypted file not found. Run tools/encrypt.html to generate Ingrdient_scatter_v5.enc.js.";
      return;
    }
    var pw = sessionStorage.getItem("trm_pw");
    if (!pw) { msg.textContent = "Session expired. Please reload."; return; }
    function b64ToBytes(b64) {
      return Uint8Array.from(atob(b64), function(c) { return c.charCodeAt(0); });
    }
    try {
      var enc  = new TextEncoder();
      var salt = b64ToBytes(ENCRYPTED_BLOB.salt);
      var iv   = b64ToBytes(ENCRYPTED_BLOB.iv);
      var data = b64ToBytes(ENCRYPTED_BLOB.data);
      var keyMat = await crypto.subtle.importKey("raw", enc.encode(pw), "PBKDF2", false, ["deriveKey"]);
      var key = await crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: salt, iterations: 150000, hash: "SHA-256" },
        keyMat, { name: "AES-GCM", length: 256 }, false, ["decrypt"]
      );
      var dec  = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, data);
      var html = new TextDecoder().decode(dec);
      document.open(); document.write(html); document.close();
    } catch (e) {
      msg.textContent = "Decryption failed — wrong password or corrupted file.";
      console.error(e);
    }
  })();
  </script>
</body>
</html>
